<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="HTML Viewer — visualizador minimalista de HTML e Markdown com pré-visualização ao vivo, documentos recentes salvos no navegador e tema claro/escuro."
    />
    <meta name="theme-color" content="#2f80ed" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>HTML Viewer — Visualizador de HTML &amp; Markdown</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,300;6..12,400;6..12,500;6..12,600;6..12,700;6..12,800&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />
    <script>
      // Apply the saved theme before first paint to avoid a flash.
      try {
        var t = localStorage.getItem("vitrine:theme") || "light";
        document.documentElement.classList.add(t);
        document.documentElement.setAttribute("data-theme", t);
        document.documentElement.style.colorScheme = t;
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
