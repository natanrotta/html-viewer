<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>HTML Viewer — Visualizador de HTML e Markdown online</title>
    <meta
      name="description"
      content="Cole HTML ou Markdown e veja o resultado renderizado ao vivo. Visualizador online grátis, com tema claro/escuro, documentos salvos no navegador e modo tela cheia."
    />
    <meta
      name="keywords"
      content="visualizador html, html viewer, renderizar html online, preview markdown, visualizar markdown, editor html online, html ao vivo, markdown online, ferramenta html grátis"
    />
    <meta name="author" content="Natan Rotta" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="theme-color" content="#2f80ed" />
    <meta name="color-scheme" content="light dark" />
    <link rel="canonical" href="https://htmlviewer.com.br/" />

    <!-- Icons & PWA -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn…) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="HTML Viewer" />
    <meta property="og:title" content="HTML Viewer — Visualizador de HTML e Markdown online" />
    <meta
      property="og:description"
      content="Cole HTML ou Markdown e veja o resultado renderizado ao vivo. Grátis, com tema claro/escuro, documentos salvos no navegador e modo tela cheia."
    />
    <meta property="og:url" content="https://htmlviewer.com.br/" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:image" content="https://htmlviewer.com.br/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="HTML Viewer — visualizador de HTML e Markdown com pré-visualização ao vivo." />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="HTML Viewer — Visualizador de HTML e Markdown online" />
    <meta
      name="twitter:description"
      content="Cole HTML ou Markdown e veja o resultado renderizado ao vivo. Grátis, com tema claro/escuro e documentos salvos no navegador."
    />
    <meta name="twitter:image" content="https://htmlviewer.com.br/og-image.png" />
    <meta name="twitter:image:alt" content="HTML Viewer — visualizador de HTML e Markdown com pré-visualização ao vivo." />

    <!-- Structured data (Google rich results) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "HTML Viewer",
        "alternateName": "Visualizador de HTML e Markdown",
        "url": "https://htmlviewer.com.br/",
        "description": "Cole HTML ou Markdown e veja o resultado renderizado ao vivo. Visualizador online grátis, com tema claro/escuro, documentos salvos no navegador e modo tela cheia.",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "Any",
        "browserRequirements": "Requires JavaScript. Requires HTML5.",
        "inLanguage": "pt-BR",
        "isAccessibleForFree": true,
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "BRL"
        },
        "author": {
          "@type": "Person",
          "name": "Natan Rotta"
        },
        "featureList": [
          "Pré-visualização ao vivo de HTML e Markdown",
          "Alternância entre HTML e Markdown",
          "Tema claro e escuro",
          "Documentos recentes salvos no navegador",
          "Modo tela cheia",
          "Editor com divisória redimensionável"
        ]
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,300;6..12,400;6..12,500;6..12,600;6..12,700;6..12,800&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />
    <script>
      // Apply the saved theme before first paint to avoid a flash.
      try {
        var t = localStorage.getItem("vitrine:theme") || "light";
        document.documentElement.classList.add(t);
        document.documentElement.setAttribute("data-theme", t);
        document.documentElement.style.colorScheme = t;
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <div style="max-width: 40rem; margin: 4rem auto; padding: 0 1.5rem; font-family: system-ui, sans-serif; line-height: 1.6; color: #1f2937;">
        <h1>HTML Viewer — Visualizador de HTML e Markdown</h1>
        <p>
          O HTML Viewer é um visualizador online gratuito: cole qualquer HTML ou Markdown
          e veja o resultado renderizado em tempo real, com tema claro/escuro, documentos
          salvos no navegador e modo tela cheia.
        </p>
        <p><strong>Este aplicativo precisa de JavaScript habilitado para funcionar.</strong></p>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
